[build]
  command = "pnpm --filter @brick/web build"
  publish = "apps/web/dist"

[build.environment]
  PNPM_VERSION = "9.15.9"
  NODE_VERSION = "22"

# SPA fallback for client-side routes (Phase 6: /r/:roomId)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets (Vite fingerprints filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
