# Builds the Vite web app and deploys the compiled static output to GitHub Pages.
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deploys; never cancel one that's already rolling out.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        # Project-site Pages URL is https://<user>.github.io/<repo>/ — Vite
        # needs that as its `base` so hashed asset URLs resolve.
        env:
          VITE_BASE_PATH: /brick-builder/
        run: pnpm --filter @brick/web build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only the compiled output, not the whole repo.
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
